<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תיק ניירות ערך</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00d4aa;
    --accent2: #0099ff;
    --red: #ff4757;
    --green: #00d4aa;
    --text: #e8edf5;
    --muted: #6b7fa3;
    --gold: #f0b429;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header-title h1 {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-title p {
    color: var(--muted);
    font-size: 13px;
    margin-top: 4px;
  }

  .last-update {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 13px;
    color: var(--muted);
  }

  .pulse {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* Summary cards */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .summary-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 60px; height: 60px;
    border-radius: 0 0 0 100%;
    opacity: 0.08;
  }

  .summary-card.total::before { background: var(--accent2); }
  .summary-card.profit::before { background: var(--green); }
  .summary-card.count::before { background: var(--gold); }

  .summary-card:hover { border-color: var(--accent); }

  .summary-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .summary-value {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .summary-value.positive { color: var(--green); }
  .summary-value.negative { color: var(--red); }
  .summary-value.neutral { color: var(--text); }

  .summary-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Stocks section */
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }

  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-primary {
    background: var(--accent);
    color: #0a0e1a;
  }

  .btn-primary:hover { background: #00f0c0; transform: translateY(-1px); }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  .btn-icon {
    width: 32px; height: 32px;
    padding: 0;
    justify-content: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
  }

  .btn-icon:hover { color: var(--text); border-color: var(--muted); }

  /* Stock cards */
  .stocks-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
  }

  .stock-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: center;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .stock-card::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 0 14px 14px 0;
    transition: opacity 0.2s;
    opacity: 0;
  }

  .stock-card.positive::after { background: var(--green); opacity: 1; }
  .stock-card.negative::after { background: var(--red); opacity: 1; }
  .stock-card:hover { border-color: rgba(0,212,170,0.3); transform: translateX(-2px); }

  .stock-left { display: flex; align-items: center; gap: 16px; }

  .stock-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .stock-info .stock-name {
    font-size: 16px;
    font-weight: 700;
  }

  .stock-meta {
    display: flex;
    gap: 12px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .stock-meta span {
    font-size: 12px;
    color: var(--muted);
  }

  .stock-meta .symbol {
    color: var(--accent2);
    font-weight: 600;
    font-size: 11px;
    background: rgba(0,153,255,0.1);
    padding: 2px 6px;
    border-radius: 4px;
  }

  .stock-right { text-align: left; }

  .price-row {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: flex-end;
    margin-bottom: 6px;
  }

  .current-price {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .change-badge {
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
  }

  .change-badge.positive { background: rgba(0,212,170,0.15); color: var(--green); }
  .change-badge.negative { background: rgba(255,71,87,0.15); color: var(--red); }
  .change-badge.neutral { background: var(--surface2); color: var(--muted); }

  .stock-pnl {
    font-size: 12px;
    color: var(--muted);
    text-align: left;
  }

  .stock-actions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    justify-content: flex-end;
  }

  .loading-indicator {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Add stock form */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 24px;
    display: none;
  }

  .add-form.open { display: block; animation: slideDown 0.2s ease; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .add-form h3 {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--text);
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .form-group input, .form-group select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    direction: ltr;
    text-align: right;
  }

  .form-group input:focus, .form-group select:focus {
    border-color: var(--accent);
  }

  .form-group input::placeholder { color: var(--muted); }

  .form-actions { display: flex; gap: 8px; justify-content: flex-end; }

  /* Refresh btn */
  .refresh-area {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .refresh-info {
    flex: 1;
    font-size: 13px;
    color: var(--muted);
  }

  /* Error/Status */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    z-index: 999;
    transition: transform 0.3s ease;
    max-width: 300px;
    text-align: center;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); }
  .toast.error { border-color: var(--red); }

  /* Sparkline */
  .sparkline-wrap {
    margin-top: 10px;
    width: 100%;
    max-width: 300px;
  }

  .sparkline-svg {
    width: 100%;
    height: 36px;
    display: block;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .stock-card { grid-template-columns: 1fr; }
    .stock-right { text-align: right; }
    .price-row { justify-content: flex-start; }
    .stock-pnl { text-align: right; }
    .stock-actions { justify-content: flex-start; }
    .summary-value { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-title">
      <h1>📊 תיק ניירות ערך</h1>
      <p>מניות ת"א · עדכון שערים אוטומטי</p>
    </div>
    <div class="last-update">
      <div class="pulse"></div>
      <span id="lastUpdateText">לא עודכן עדיין</span>
    </div>
  </header>

  <!-- Summary -->
  <div id="summarySection"></div>

  <!-- Refresh bar -->
  <div class="refresh-area">
    <div class="refresh-info">
      השערים מתעדכנים מהבורסה לניירות ערך בת"א
    </div>
    <button class="btn btn-ghost" onclick="refreshAll()" id="refreshBtn">
      🔄 רענן שערים
    </button>
  </div>

  <!-- Stocks -->
  <div class="section-header">
    <div class="section-title">ניירות ערך</div>
    <button class="btn btn-primary" onclick="toggleAddForm()">
      + הוסף נייר ערך
    </button>
  </div>

  <!-- Add form -->
  <div class="add-form" id="addForm">
    <h3>➕ הוספת נייר ערך חדש</h3>
    <div class="form-grid">
      <div class="form-group">
        <label>שם המניה</label>
        <input type="text" id="newName" placeholder="לדוג׳ כך: בנק הפועלים">
      </div>
      <div class="form-group">
        <label>סימול (מספר ב-TASE)</label>
        <input type="text" id="newSymbol" placeholder="לדוג׳: 1120 או FIBI">
      </div>
      <div class="form-group">
        <label>כמות מניות</label>
        <input type="number" id="newQty" placeholder="100">
      </div>
      <div class="form-group">
        <label>מחיר קנייה ממוצע (₪)</label>
        <input type="number" id="newAvgPrice" placeholder="52.30" step="0.01">
      </div>
      <div class="form-group">
        <label>אמוג'י (אופציונלי)</label>
        <input type="text" id="newEmoji" placeholder="🏦" maxlength="2">
      </div>
      <div class="form-group">
        <label>תאריך רכישה ראשון</label>
        <input type="date" id="newDate">
      </div>
      <div class="form-group" style="grid-column: 1 / -1;">
        <label>תיאור / שייך למי (אופציונלי)</label>
        <input type="text" id="newDesc" placeholder='לדוג׳: הנייר ערך של הבן 1'>
      </div>
      <div class="form-group" style="grid-column: 1 / -1;">
        <label>תמונה (קישור URL)</label>
        <input type="url" id="newImg" placeholder="https://..." dir="ltr">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="toggleAddForm()">ביטול</button>
      <button class="btn btn-primary" onclick="addStock()">הוסף</button>
    </div>
  </div>

  <div class="stocks-list" id="stocksList">
    <!-- stocks rendered here -->
  </div>

  <div style="text-align:center; color: var(--muted); font-size: 12px; margin-top: 24px;">
    נתונים: API ציבורי · מידע למטרות מעקב אישי בלבד
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── State ───────────────────────────────────────────────────────
const STORAGE_KEY = 'tase_portfolio_v1';

let portfolio = loadPortfolio();

function loadPortfolio() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  // Default demo stocks
  return [
    { id: 1, name: 'בנק הפועלים', symbol: '1120', qty: 100, avgPrice: 30.50, emoji: '🏦', currentPrice: null, change: null },
    { id: 2, name: 'טבע', symbol: '1167', qty: 50, avgPrice: 38.20, emoji: '💊', currentPrice: null, change: null },
    { id: 3, name: 'אלביט מערכות', symbol: '1606', qty: 20, avgPrice: 520.00, emoji: '🛡️', currentPrice: null, change: null },
  ];
}

function savePortfolio() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(portfolio));
}

// ─── TASE API via Yahoo Finance proxy ────────────────────────────
// Uses Yahoo Finance which carries TASE stocks with .TA suffix
async function fetchPrice(symbol) {
  const formats = [`${symbol}.TA`, symbol];

  for (const fmt of formats) {
    try {
      const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${fmt}?interval=1d&range=2d`;
      // Use allorigins as CORS proxy
      const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(yahooUrl)}`;
      const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const wrapper = await res.json();
      const data = JSON.parse(wrapper.contents);
      const result = data?.chart?.result?.[0];
      if (!result) continue;

      const meta = result.meta;
      let price = meta.regularMarketPrice;
      let prevClose = meta.previousClose || meta.chartPreviousClose;
      if (!price) continue;

      // מניות ת"א נסחרות באגורות ב-Yahoo Finance - מחלקים ב-100
      if (fmt.endsWith('.TA')) {
        price = price / 100;
        if (prevClose) prevClose = prevClose / 100;
      }

      const change = prevClose ? ((price - prevClose) / prevClose * 100) : 0;
      return { price, change, prevClose };
    } catch(e) { continue; }
  }
  return null;
}

// ─── Render ───────────────────────────────────────────────────────
function fmt(n, decimals = 2) {
  if (n == null || isNaN(n)) return '—';
  return n.toLocaleString('he-IL', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function renderStock(stock) {
  const hasPrice = stock.currentPrice != null;
  const value = hasPrice ? stock.currentPrice * stock.qty : null;
  const cost = stock.avgPrice * stock.qty;
  const pnl = value != null ? value - cost : null;
  const pnlPct = pnl != null ? (pnl / cost * 100) : null;
  const isPos = stock.change >= 0;
  const pnlPos = pnl >= 0;

  const changeClass = !hasPrice ? 'neutral' : (isPos ? 'positive' : 'negative');
  const cardClass = !hasPrice ? '' : (isPos ? 'positive' : 'negative');

  return `
  <div class="stock-card ${cardClass}" id="stock-${stock.id}">
    <div class="stock-left">
      <div class="stock-icon">
        ${stock.imgUrl
          ? `<img src="${stock.imgUrl}" alt="${stock.name}" style="width:100%;height:100%;object-fit:cover;border-radius:11px" onerror="this.parentElement.textContent='${stock.emoji || '📈'}'"/>`
          : (stock.emoji || '📈')}
      </div>
      <div class="stock-info">
        <div class="stock-name">${stock.name}</div>
        <div class="stock-meta">
          <span class="symbol">${stock.symbol}</span>
          <span>${fmt(stock.qty, 0)} מניות</span>
          <span>עלות: ₪${fmt(stock.avgPrice)}</span>
          ${stock.purchaseDate ? `<span>📅 ${new Date(stock.purchaseDate).toLocaleDateString('he-IL')}</span>` : ''}
          ${stock.desc ? `<span style="color:var(--gold);font-weight:600">👤 ${stock.desc}</span>` : ''}
        </div>
        ${hasPrice ? `
        <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px">
            <div style="color:var(--muted);font-size:10px;margin-bottom:2px">שינוי יומי</div>
            <div style="color:${isPos ? 'var(--green)' : 'var(--red)'};font-weight:700">
              ${isPos ? '+' : ''}${fmt(stock.change)}%
            </div>
          </div>
          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px">
            <div style="color:var(--muted);font-size:10px;margin-bottom:2px">מתחילת רכישה</div>
            <div style="color:${pnlPos ? 'var(--green)' : 'var(--red)'};font-weight:700">
              ${pnlPos ? '+' : ''}${fmt(pnlPct)}%
              <span style="font-weight:400;opacity:0.8">&nbsp;(${pnlPos ? '+' : ''}₪${fmt(Math.abs(pnl), 0)})</span>
            </div>
          </div>
        </div>` : ''}
        ${hasPrice ? `
        <div class="sparkline-wrap" id="spark-${stock.id}">
          ${drawBuyVsCurrent(stock)}
        </div>` : ''}
      </div>
    </div>
    <div class="stock-right">
      <div class="price-row">
        <div class="current-price">
          ${hasPrice
            ? `₪${fmt(stock.currentPrice)}`
            : `<span class="loading-indicator"></span>`}
        </div>
      </div>
      <div class="stock-actions">
        <button class="btn btn-icon" onclick="setManualPrice(${stock.id})" title="הזן שער ידני" style="color:var(--gold);border-color:rgba(240,180,41,0.3)">✍️</button>
        <button class="btn btn-icon" onclick="editStock(${stock.id})" title="עריכה">✏️</button>
        <button class="btn btn-icon" onclick="deleteStock(${stock.id})" title="מחק">🗑️</button>
      </div>
      ${stock.manualPrice ? `<div style="font-size:11px;color:var(--gold);text-align:left;margin-top:4px">✍️ שער ידני</div>` : ''}
    </div>
  </div>`;
}

function renderAll() {
  const list = document.getElementById('stocksList');
  if (portfolio.length === 0) {
    list.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">
      אין ניירות ערך בתיק. לחץ על "הוסף נייר ערך" כדי להתחיל.
    </div>`;
    document.getElementById('summarySection').innerHTML = '';
    return;
  }
  list.innerHTML = portfolio.map(renderStock).join('');
  updateSummary();
}

function updateSummary() {
  let totalValue = 0, totalCost = 0;

  // סיכום כולל
  for (const s of portfolio) {
    totalCost += s.avgPrice * s.qty;
    if (s.currentPrice != null) totalValue += s.currentPrice * s.qty;
  }
  const totalPnl = totalValue - totalCost;
  const totalPnlPct = totalCost ? (totalPnl / totalCost * 100) : 0;
  const totalPos = totalPnl >= 0;

  // קיבוץ לפי תיאור (desc)
  const groups = {};
  for (const s of portfolio) {
    const key = s.desc || '—';
    if (!groups[key]) groups[key] = { stocks: [], value: 0, cost: 0 };
    groups[key].stocks.push(s);
    groups[key].cost += s.avgPrice * s.qty;
    if (s.currentPrice != null) groups[key].value += s.currentPrice * s.qty;
  }

  const groupCards = Object.entries(groups).map(([name, g]) => {
    const pnl = g.value - g.cost;
    const pct = g.cost ? (pnl / g.cost * 100) : 0;
    const pos = pnl >= 0;
    const hasPrice = g.value > 0;
    return `
    <div class="summary-card" style="border-color: ${pos ? 'rgba(0,212,170,0.2)' : 'rgba(255,71,87,0.2)'}">
      <div class="summary-label" style="color:var(--gold)">👤 ${name}</div>
      <div class="summary-value neutral" style="font-size:20px">
        ${hasPrice ? `₪${fmt(g.value, 0)}` : '—'}
      </div>
      <div class="summary-sub" style="color:${pos ? 'var(--green)' : 'var(--red)'}">
        ${hasPrice ? `${pos ? '▲ +' : '▼ '}₪${fmt(Math.abs(pnl), 0)} (${pos?'+':''}${fmt(pct)}%)` : 'ממתין לשער'}
      </div>
    </div>`;
  }).join('');

  document.getElementById('summarySection').innerHTML = `
    <div class="summary-grid" style="margin-bottom:12px">
      <div class="summary-card total">
        <div class="summary-label">שווי תיק כולל</div>
        <div class="summary-value neutral">₪${fmt(totalValue, 0)}</div>
        <div class="summary-sub" style="color:${totalPos ? 'var(--green)' : 'var(--red)'}">
          ${totalPos ? '▲ +' : '▼ '}₪${fmt(Math.abs(totalPnl), 0)} (${totalPos?'+':''}${fmt(totalPnlPct)}%)
        </div>
      </div>
      ${groupCards}
    </div>`;
}

// ─── Refresh ──────────────────────────────────────────────────────
async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-indicator"></span> מעדכן...';

  const results = await Promise.allSettled(
    portfolio.map(async (stock) => {
      if (stock.manualPrice) return stock; // שמור שער ידני
      const data = await fetchPrice(stock.symbol);
      if (data) {
        stock.currentPrice = data.price;
        stock.change = data.change;
        stock.prevClose = data.prevClose;
      }
      return stock;
    })
  );

  savePortfolio();
  renderAll();

  const now = new Date();
  document.getElementById('lastUpdateText').textContent =
    `עודכן ${now.toLocaleTimeString('he-IL', {hour:'2-digit',minute:'2-digit'})}`;

  const succeeded = results.filter(r => r.status === 'fulfilled' && r.value.currentPrice != null).length;
  showToast(`עודכנו ${succeeded}/${portfolio.length} ניירות ערך`, succeeded > 0 ? 'success' : 'error');

  btn.disabled = false;
  btn.innerHTML = '🔄 רענן שערים';
}

// ─── Add / Delete / Edit ──────────────────────────────────────────
function toggleAddForm() {
  const f = document.getElementById('addForm');
  f.classList.toggle('open');
}

function addStock() {
  const name = document.getElementById('newName').value.trim();
  const symbol = document.getElementById('newSymbol').value.trim();
  const qty = parseFloat(document.getElementById('newQty').value);
  const avgPrice = parseFloat(document.getElementById('newAvgPrice').value);
  const emoji = document.getElementById('newEmoji').value.trim() || '📈';
  const desc = document.getElementById('newDesc').value.trim();
  const purchaseDate = document.getElementById('newDate').value;
  const imgUrl = document.getElementById('newImg').value.trim();

  if (!name || !symbol || isNaN(qty) || isNaN(avgPrice)) {
    showToast('נא למלא את כל השדות', 'error');
    return;
  }

  const newStock = {
    id: Date.now(),
    name, symbol, qty, avgPrice, emoji, desc, purchaseDate, imgUrl,
    currentPrice: null, change: null
  };

  portfolio.push(newStock);
  savePortfolio();
  toggleAddForm();

  // Clear form
  ['newName','newSymbol','newQty','newAvgPrice','newEmoji','newDesc','newDate','newImg'].forEach(id => {
    document.getElementById(id).value = '';
  });

  renderAll();
  showToast(`${name} נוסף לתיק`, 'success');

  // Auto-fetch price for new stock
  fetchPrice(symbol).then(data => {
    if (data) {
      const s = portfolio.find(x => x.id === newStock.id);
      if (s) { s.currentPrice = data.price; s.change = data.change; }
      savePortfolio();
      renderAll();
    }
  });
}

function setManualPrice(id) {
  const stock = portfolio.find(s => s.id === id);
  if (!stock) return;
  const input = prompt(`הזן שער נוכחי ידנית עבור ${stock.name} (₪):`, stock.currentPrice || '');
  if (input === null) return;
  const price = parseFloat(input);
  if (isNaN(price) || price <= 0) { showToast('שער לא תקין', 'error'); return; }
  stock.currentPrice = price;
  stock.change = stock.prevClose ? ((price - stock.prevClose) / stock.prevClose * 100) : 0;
  stock.manualPrice = true;
  savePortfolio();
  renderAll();
  showToast(`שער ${stock.name} עודכן ידנית ל-₪${fmt(price)}`, 'success');
}

function deleteStock(id) {
  const stock = portfolio.find(s => s.id === id);
  if (!stock) return;
  if (!confirm(`למחוק את ${stock.name} מהתיק?`)) return;
  portfolio = portfolio.filter(s => s.id !== id);
  savePortfolio();
  renderAll();
  showToast(`${stock.name} הוסר מהתיק`);
}

function editStock(id) {
  const stock = portfolio.find(s => s.id === id);
  if (!stock) return;

  const qty = prompt(`כמות מניות (${stock.name}):`, stock.qty);
  if (qty === null) return;
  const price = prompt(`מחיר קנייה ממוצע:`, stock.avgPrice);
  if (price === null) return;

  stock.qty = parseFloat(qty) || stock.qty;
  stock.avgPrice = parseFloat(price) || stock.avgPrice;
  const desc = prompt('תיאור / שייך למי (השאר ריק לביטול):', stock.desc || '');
  if (desc !== null) stock.desc = desc;
  const dateInput = prompt('תאריך רכישה ראשון (YYYY-MM-DD):', stock.purchaseDate || '');
  if (dateInput !== null) stock.purchaseDate = dateInput;
  const imgUrl = prompt('קישור לתמונה (URL):', stock.imgUrl || '');
  if (imgUrl !== null) stock.imgUrl = imgUrl;
  savePortfolio();
  renderAll();
  showToast('עודכן בהצלחה', 'success');
}

// ─── Toast ────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ─── Buy vs Current Chart ─────────────────────────────────────────
function drawBuyVsCurrent(stock) {
  const buy = stock.avgPrice;
  const cur = stock.currentPrice;
  if (!cur) return '';

  const isPos = cur >= buy;
  const color = isPos ? '#00d4aa' : '#ff4757';
  const W = 200, H = 48, padX = 8, padY = 8;

  // 3 נקודות: קנייה → אמצע (מגמה) → נוכחי
  const minP = Math.min(buy, cur) * 0.998;
  const maxP = Math.max(buy, cur) * 1.002;
  const range = maxP - minP || 1;

  const toY = v => H - padY - ((v - minP) / range) * (H - padY * 2);
  const x0 = padX, x1 = W / 2, x2 = W - padX;
  const y0 = toY(buy);
  // נקודת אמצע עם קצת "תנועה" להראות מגמה
  const midVal = (buy + cur) / 2 + (cur - buy) * 0.15;
  const y1 = toY(Math.min(Math.max(midVal, minP), maxP));
  const y2 = toY(cur);

  const pct = ((cur - buy) / buy * 100);
  const pctStr = `${isPos ? '+' : ''}${pct.toFixed(2)}%`;

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:48px;display:block;margin-top:8px" preserveAspectRatio="none">
    <defs>
      <linearGradient id="bg-${stock.id}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <!-- אזור מילוי -->
    <polygon points="${x0},${H} ${x0},${y0} ${x1},${y1} ${x2},${y2} ${x2},${H}"
      fill="url(#bg-${stock.id})"/>
    <!-- קו מגמה -->
    <polyline points="${x0},${y0} ${x1},${y1} ${x2},${y2}"
      fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- נקודת קנייה -->
    <circle cx="${x0}" cy="${y0}" r="3.5" fill="var(--surface2)" stroke="${color}" stroke-width="1.5"/>
    <!-- נקודת נוכחי -->
    <circle cx="${x2}" cy="${y2}" r="4" fill="${color}"/>
    <!-- תווית קנייה -->
    <text x="${x0 + 5}" y="${y0 - 5}" fill="var(--muted)" font-size="8" font-family="Heebo,sans-serif">קנייה ₪${buy}</text>
    <!-- תווית נוכחי -->
    <text x="${x2 - 5}" y="${y2 - 6}" fill="${color}" font-size="8" font-family="Heebo,sans-serif" text-anchor="end">₪${cur.toFixed(2)}</text>
    <!-- אחוז שינוי באמצע -->
    <text x="${W/2}" y="${H - 3}" fill="${color}" font-size="9" font-family="Heebo,sans-serif" text-anchor="middle" font-weight="700">${pctStr} מהקנייה</text>
  </svg>`;
}

// ─── Init ─────────────────────────────────────────────────────────
renderAll();
setTimeout(refreshAll, 500);
setInterval(refreshAll, 5 * 60 * 1000);
</script>
</body>
</html>
