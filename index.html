<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תיק ניירות ערך</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00d4aa;
    --accent2: #0099ff;
    --red: #ff4757;
    --green: #00d4aa;
    --text: #e8edf5;
    --muted: #6b7fa3;
    --gold: #f0b429;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header-title h1 {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-title p {
    color: var(--muted);
    font-size: 13px;
    margin-top: 4px;
  }

  .last-update {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 13px;
    color: var(--muted);
  }

  .pulse {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* Summary cards */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .summary-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 60px; height: 60px;
    border-radius: 0 0 0 100%;
    opacity: 0.08;
  }

  .summary-card.total::before { background: var(--accent2); }
  .summary-card.profit::before { background: var(--green); }
  .summary-card.count::before { background: var(--gold); }

  .summary-card:hover { border-color: var(--accent); }

  .summary-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .summary-value {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .summary-value.positive { color: var(--green); }
  .summary-value.negative { color: var(--red); }
  .summary-value.neutral { color: var(--text); }

  .summary-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Stocks section */
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }

  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-primary {
    background: var(--accent);
    color: #0a0e1a;
  }

  .btn-primary:hover { background: #00f0c0; transform: translateY(-1px); }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  .btn-icon {
    width: 32px; height: 32px;
    padding: 0;
    justify-content: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
  }

  .btn-icon:hover { color: var(--text); border-color: var(--muted); }

  /* Stock cards */
  .stocks-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
  }

  .stock-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: center;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .stock-card::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 0 14px 14px 0;
    transition: opacity 0.2s;
    opacity: 0;
  }

  .stock-card.positive::after { background: var(--green); opacity: 1; }
  .stock-card.negative::after { background: var(--red); opacity: 1; }
  .stock-card:hover { border-color: rgba(0,212,170,0.3); transform: translateX(-2px); }

  .stock-left { display: flex; align-items: center; gap: 16px; }

  .stock-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .stock-info .stock-name {
    font-size: 16px;
    font-weight: 700;
  }

  .stock-meta {
    display: flex;
    gap: 12px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .stock-meta span {
    font-size: 12px;
    color: var(--muted);
  }

  .stock-meta .symbol {
    color: var(--accent2);
    font-weight: 600;
    font-size: 11px;
    background: rgba(0,153,255,0.1);
    padding: 2px 6px;
    border-radius: 4px;
  }

  .stock-right { text-align: left; }

  .price-row {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: flex-end;
    margin-bottom: 6px;
  }

  .current-price {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .change-badge {
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
  }

  .change-badge.positive { background: rgba(0,212,170,0.15); color: var(--green); }
  .change-badge.negative { background: rgba(255,71,87,0.15); color: var(--red); }
  .change-badge.neutral { background: var(--surface2); color: var(--muted); }

  .stock-pnl {
    font-size: 12px;
    color: var(--muted);
    text-align: left;
  }

  .stock-actions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    justify-content: flex-end;
  }

  .loading-indicator {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Add stock form */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 24px;
    display: none;
  }

  .add-form.open { display: block; animation: slideDown 0.2s ease; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .add-form h3 {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--text);
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .form-group input, .form-group select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    direction: ltr;
    text-align: right;
  }

  .form-group input:focus, .form-group select:focus {
    border-color: var(--accent);
  }

  .form-group input::placeholder { color: var(--muted); }

  .form-actions { display: flex; gap: 8px; justify-content: flex-end; }

  /* Refresh btn */
  .refresh-area {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .refresh-info {
    flex: 1;
    font-size: 13px;
    color: var(--muted);
  }

  /* Error/Status */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    z-index: 999;
    transition: transform 0.3s ease;
    max-width: 300px;
    text-align: center;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); }
  .toast.error { border-color: var(--red); }

  /* Sparkline */
  .sparkline-wrap {
    margin-top: 10px;
    width: 100%;
    max-width: 300px;
  }

  .sparkline-svg {
    width: 100%;
    height: 36px;
    display: block;
  }

  /* Login screen */
  .login-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    flex-direction: column;
    gap: 24px;
    padding: 24px;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }

  .login-card h2 {
    font-size: 22px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .login-card p {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 24px;
  }

  .login-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 16px;
    outline: none;
    text-align: center;
    letter-spacing: 0.1em;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }

  .login-input:focus { border-color: var(--accent); }

  .login-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #0a0e1a;
    border: none;
    border-radius: 10px;
    font-family: 'Heebo', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .login-btn:hover { background: #00f0c0; }

  .login-error {
    color: var(--red);
    font-size: 13px;
    margin-top: 10px;
    min-height: 20px;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .stock-card { grid-template-columns: 1fr; }
    .stock-right { text-align: right; }
    .price-row { justify-content: flex-start; }
    .stock-pnl { text-align: right; }
    .stock-actions { justify-content: flex-start; }
    .summary-value { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div style="font-size:48px;margin-bottom:12px">📊</div>
    <h2>תיק ניירות ערך</h2>
    <p>הכנס קוד גישה כדי להמשיך</p>
    <input class="login-input" type="password" id="loginInput" placeholder="קוד גישה" onkeydown="if(event.key==='Enter') doLogin()">
    <button class="login-btn" onclick="doLogin()">כניסה</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div class="container" id="mainApp" style="display:none">

  <header>
    <div class="header-title">
      <h1>📊 תיק ניירות ערך</h1>
      <p>מניות ת"א · עדכון שערים אוטומטי</p>
    </div>
    <div class="last-update">
      <div class="pulse"></div>
      <span id="lastUpdateText">לא עודכן עדיין</span>
    </div>
  </header>

  <!-- Summary -->
  <div id="summarySection"></div>

  <!-- Refresh bar -->
  <div class="refresh-area">
    <div class="refresh-info">
      השערים מתעדכנים מהבורסה לניירות ערך בת"א
    </div>
    <button class="btn btn-ghost" onclick="refreshAll()" id="refreshBtn">
      🔄 רענן שערים
    </button>
  </div>

  <!-- Stocks -->
  <div class="section-header">
    <div class="section-title">ניירות ערך</div>
    <button class="btn btn-primary" onclick="toggleAddForm()">
      + הוסף נייר ערך
    </button>
  </div>

  <!-- Add form -->
  <div class="add-form" id="addForm">
    <h3>➕ הוספת נייר ערך חדש</h3>
    <div class="form-grid">
      <div class="form-group">
        <label>שם המניה</label>
        <input type="text" id="newName" placeholder="לדוג׳ כך: בנק הפועלים">
      </div>
      <div class="form-group">
        <label>סימול (מספר ב-TASE)</label>
        <input type="text" id="newSymbol" placeholder="לדוג׳: 1120 או FIBI">
      </div>
      <div class="form-group">
        <label>כמות מניות</label>
        <input type="number" id="newQty" placeholder="100">
      </div>
      <div class="form-group">
        <label>מחיר קנייה ממוצע (₪)</label>
        <input type="number" id="newAvgPrice" placeholder="52.30" step="0.01">
      </div>
      <div class="form-group">
        <label>אמוג'י (אופציונלי)</label>
        <input type="text" id="newEmoji" placeholder="🏦" maxlength="2">
      </div>
      <div class="form-group">
        <label>תאריך רכישה ראשון</label>
        <input type="date" id="newDate">
      </div>
      <div class="form-group" style="grid-column: 1 / -1;">
        <label>תיאור / שייך למי (אופציונלי)</label>
        <input type="text" id="newDesc" placeholder='לדוג׳: הנייר ערך של הבן 1'>
      </div>
      <div class="form-group" style="grid-column: 1 / -1;">
        <label>תמונה (קישור URL)</label>
        <input type="url" id="newImg" placeholder="https://..." dir="ltr">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="toggleAddForm()">ביטול</button>
      <button class="btn btn-primary" onclick="addStock()">הוסף</button>
    </div>
  </div>

  <div class="stocks-list" id="stocksList">
    <!-- stocks rendered here -->
  </div>

  <div style="text-align:center; color: var(--muted); font-size: 12px; margin-top: 24px;">
    נתונים: API ציבורי · מידע למטרות מעקב אישי בלבד
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Config ───────────────────────────────────────────────────────
const PROXY_URL = 'https://stock-privet-246561042500.me-west1.run.app';

// ─── Login ────────────────────────────────────────────────────────
async function doLogin() {
  const input = document.getElementById('loginInput').value.trim();
  if (!input) return;

  const btn = document.querySelector('.login-btn');
  btn.textContent = 'מאמת...';
  btn.disabled = true;

  try {
    const res = await fetch(`${PROXY_URL}/auth`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: input })
    });

    if (res.ok) {
      sessionStorage.setItem('portfolio_key', input);
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
      init();
    } else {
      document.getElementById('loginError').textContent = 'קוד גישה שגוי';
      document.getElementById('loginInput').value = '';
    }
  } catch(e) {
    document.getElementById('loginError').textContent = 'שגיאת חיבור לשרת';
  }

  btn.textContent = 'כניסה';
  btn.disabled = false;
}

function getKey() {
  return sessionStorage.getItem('portfolio_key');
}

// ─── API ──────────────────────────────────────────────────────────
async function apiGet() {
  const res = await fetch(`${PROXY_URL}/portfolio`, {
    headers: { 'X-API-Key': getKey() }
  });
  if (!res.ok) throw new Error('שגיאת שרת');
  const data = await res.json();
  return data.stocks || [];
}

async function apiPost(action, payload) {
  const res = await fetch(`${PROXY_URL}/portfolio`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-API-Key': getKey()
    },
    body: JSON.stringify({ action, ...payload })
  });
  if (!res.ok) throw new Error('שגיאת שרת');
  return res.json();
}

// ─── State ────────────────────────────────────────────────────────
let portfolio = [];

async function loadPortfolio() {
  try {
    const stocks = await apiGet();
    portfolio = stocks.map(s => ({
      ...s,
      qty: parseFloat(s.qty) || 0,
      avgPrice: parseFloat(s.avgPrice) || 0,
      currentPrice: s.currentPrice ? parseFloat(s.currentPrice) : null,
      change: s.change ? parseFloat(s.change) : null,
    }));
  } catch(e) {
    showToast('שגיאה בטעינת נתונים', 'error');
  }
}

async function saveStock(action, stock) {
  try {
    await apiPost(action, { stock });
  } catch(e) {
    showToast('שגיאה בשמירה', 'error');
  }
}

async function deleteStockRemote(row) {
  try {
    await apiPost('delete', { row });
  } catch(e) {
    showToast('שגיאה במחיקה', 'error');
  }
}

// ─── TASE API via Yahoo Finance proxy ────────────────────────────
// Uses Yahoo Finance which carries TASE stocks with .TA suffix
async function fetchPrice(symbol) {
  try {
    const base = symbol.toUpperCase().replace(/\.TA$/i, '');
    const url = `${PROXY_URL}/price?symbol=${encodeURIComponent(base)}`;
    const res = await fetch(url, {
      headers: { 'X-API-Key': getKey() },
      signal: AbortSignal.timeout(8000)
    });
    if (!res.ok) return null;
    const data = await res.json();
    if (data.error) return null;
    return { price: data.price, change: data.change, prevClose: data.prevClose };
  } catch(e) { return null; }
}

// ─── Render ───────────────────────────────────────────────────────
function fmt(n, decimals = 2) {
  if (n == null || isNaN(n)) return '—';
  return n.toLocaleString('he-IL', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function renderStock(stock) {
  const hasPrice = stock.currentPrice != null && stock.currentPrice > 0;
  const value = hasPrice ? stock.currentPrice * stock.qty : null;
  const cost = stock.avgPrice * stock.qty;
  const pnl = value != null ? value - cost : null;
  const pnlPct = pnl != null ? (pnl / cost * 100) : null;
  const isPos = (stock.change || 0) >= 0;
  const pnlPos = (pnl || 0) >= 0;
  const dayPnl = hasPrice ? (stock.change / 100) * value : null;
  const daysHeld = stock.purchaseDate
    ? Math.floor((new Date() - new Date(stock.purchaseDate)) / (1000*60*60*24))
    : null;

  const cardClass = !hasPrice ? '' : (isPos ? 'positive' : 'negative');

  return `
  <div class="stock-card ${cardClass}" id="stock-${stock._row}" style="padding:0;overflow:hidden">

    <!-- כותרת כרטיס -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:10px">
        ${stock.imgUrl
          ? `<img src="${stock.imgUrl}" style="width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid var(--border)" onerror="this.style.display='none'"/>`
          : `<div style="width:34px;height:34px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px">${stock.emoji || '📈'}</div>`}
        <div>
          <div style="font-size:15px;font-weight:800">${stock.name}</div>
          <div style="display:flex;gap:6px;align-items:center;margin-top:2px;flex-wrap:wrap">
            <span class="symbol">${stock.symbol}</span>
            ${stock.desc ? `<span style="color:var(--gold);font-size:11px;font-weight:600">👤 ${stock.desc}</span>` : ''}
            ${stock.purchaseDate ? `<span style="color:var(--muted);font-size:11px">📅 ${new Date(stock.purchaseDate).toLocaleDateString('he-IL')}${daysHeld ? ` · ${daysHeld} ימים` : ''}</span>` : ''}
          </div>
        </div>
      </div>
      <div style="display:flex;gap:5px">
        <button class="btn btn-icon" onclick="setManualPrice(${stock._row})" title="שער ידני" style="color:var(--gold);border-color:rgba(240,180,41,0.3)">✍️</button>
        <button class="btn btn-icon" onclick="editStock(${stock._row})" title="עריכה">✏️</button>
        <button class="btn btn-icon" onclick="deleteStock(${stock._row})" title="מחק">🗑️</button>
      </div>
    </div>

    <!-- שורה עליונה - שווי בולט -->
    <div style="display:grid;grid-template-columns:1fr 1fr;padding:14px 16px 10px;border-bottom:1px solid var(--border)">
      <div style="text-align:right;padding-left:12px;border-left:1px solid var(--border)">
        <div style="color:var(--muted);font-size:11px;margin-bottom:4px">שווי אחזקה</div>
        <div style="font-size:26px;font-weight:900;letter-spacing:-0.5px">
          ${hasPrice ? `₪${fmt(value, 0)}` : `<span class="loading-indicator"></span>`}
        </div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${fmt(stock.qty, 0)} יחידות</div>
      </div>
      <div style="text-align:right">
        <div style="color:var(--muted);font-size:11px;margin-bottom:4px">עלות קנייה</div>
        <div style="font-size:26px;font-weight:900;letter-spacing:-0.5px;color:var(--muted)">₪${fmt(cost, 0)}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">₪${fmt(stock.avgPrice)} ליחידה</div>
      </div>
    </div>

    <!-- שורה תחתונה - שער + שינויים -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;padding:12px 16px;gap:0">
      <div style="text-align:right;padding-left:12px;border-left:1px solid var(--border)">
        <div style="color:var(--muted);font-size:11px;margin-bottom:4px">שער אחרון</div>
        <div style="font-size:16px;font-weight:800">
          ${hasPrice ? `₪${fmt(stock.currentPrice)}` : `<span class="loading-indicator"></span>`}
        </div>
        ${stock.manualPrice ? `<div style="font-size:10px;color:var(--gold)">✍️ ידני</div>` : ''}
      </div>
      <div style="text-align:right;padding:0 12px;border-left:1px solid var(--border)">
        <div style="color:var(--muted);font-size:11px;margin-bottom:4px">שינוי יומי</div>
        ${hasPrice ? `
        <div style="font-size:16px;font-weight:800;color:${isPos ? 'var(--green)' : 'var(--red)'}">
          ${isPos ? '+' : ''}${fmt(stock.change)}%
        </div>
        <div style="font-size:12px;color:${isPos ? 'var(--green)' : 'var(--red)'}">
          ${dayPnl != null ? `${isPos ? '+' : ''}₪${fmt(Math.abs(dayPnl), 0)}` : ''}
        </div>` : '<div style="color:var(--muted)">—</div>'}
      </div>
      <div style="text-align:right">
        <div style="color:var(--muted);font-size:11px;margin-bottom:4px">שינוי מרכישה</div>
        ${hasPrice ? `
        <div style="font-size:16px;font-weight:800;color:${pnlPos ? 'var(--green)' : 'var(--red)'}">
          ${pnlPos ? '+' : ''}${fmt(pnlPct)}%
        </div>
        <div style="font-size:12px;color:${pnlPos ? 'var(--green)' : 'var(--red)'}">
          ${pnlPos ? '+' : ''}₪${fmt(Math.abs(pnl), 0)}
        </div>` : '<div style="color:var(--muted)">—</div>'}
      </div>
    </div>

    <!-- גרף -->
    ${hasPrice ? `
    <div style="padding:0 16px 14px">
      ${drawBuyVsCurrent(stock)}
    </div>` : ''}

  </div>`;
}

function renderAll() {
  const list = document.getElementById('stocksList');
  if (portfolio.length === 0) {
    list.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">
      אין ניירות ערך בתיק. לחץ על "הוסף נייר ערך" כדי להתחיל.
    </div>`;
    document.getElementById('summarySection').innerHTML = '';
    return;
  }
  list.innerHTML = portfolio.map(renderStock).join('');
  updateSummary();
  // טען גרפים אוטומטית
  setTimeout(() => {
    portfolio.forEach(s => { if (s.currentPrice) loadChart(s._row); });
  }, 300);
}

function updateSummary() {
  let totalValue = 0, totalCost = 0;

  // סיכום כולל
  for (const s of portfolio) {
    totalCost += s.avgPrice * s.qty;
    if (s.currentPrice != null) totalValue += s.currentPrice * s.qty;
  }
  const totalPnl = totalValue - totalCost;
  const totalPnlPct = totalCost ? (totalPnl / totalCost * 100) : 0;
  const totalPos = totalPnl >= 0;

  // קיבוץ לפי תיאור (desc)
  const groups = {};
  for (const s of portfolio) {
    const key = s.desc || '—';
    if (!groups[key]) groups[key] = { stocks: [], value: 0, cost: 0 };
    groups[key].stocks.push(s);
    groups[key].cost += s.avgPrice * s.qty;
    if (s.currentPrice != null) groups[key].value += s.currentPrice * s.qty;
  }

  const groupCards = Object.entries(groups).map(([name, g]) => {
    const pnl = g.value - g.cost;
    const pct = g.cost ? (pnl / g.cost * 100) : 0;
    const pos = pnl >= 0;
    const hasPrice = g.value > 0;
    return `
    <div class="summary-card" style="border-color:${pos ? 'rgba(0,212,170,0.2)' : 'rgba(255,71,87,0.2)'};min-width:140px;flex-shrink:0">
      <div class="summary-label" style="color:var(--gold)">👤 ${name}</div>
      <div class="summary-value neutral" style="font-size:20px">
        ${hasPrice ? `₪${fmt(g.value, 0)}` : '—'}
      </div>
      <div class="summary-sub" style="color:${pos ? 'var(--green)' : 'var(--red)'}">
        ${hasPrice ? `${pos ? '▲ +' : '▼ '}₪${fmt(Math.abs(pnl), 0)} (${pos?'+':''}${fmt(pct)}%)` : 'ממתין לשער'}
      </div>
    </div>`;
  }).join('');

  document.getElementById('summarySection').innerHTML = `
    <!-- כרטיס כולל -->
    <div class="summary-card total" style="margin-bottom:12px">
      <div class="summary-label">שווי תיק כולל</div>
      <div class="summary-value neutral">₪${fmt(totalValue, 0)}</div>
      <div class="summary-sub" style="color:${totalPos ? 'var(--green)' : 'var(--red)'}">
        ${totalPos ? '▲ +' : '▼ '}₪${fmt(Math.abs(totalPnl), 0)} (${totalPos?'+':''}${fmt(totalPnlPct)}%)
      </div>
    </div>
    <!-- כרטיסי ילדים בשורה אחת עם גלילה -->
    <div style="display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;-webkit-overflow-scrolling:touch;scrollbar-width:none">
      ${groupCards}
    </div>`;
}

// ─── Refresh ──────────────────────────────────────────────────────
async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-indicator"></span> מעדכן...';

  // טען מחדש מה-Sheet קודם
  await loadPortfolio();
  renderAll();

  // עדכן שערים - כל מניה בנפרד ורנדר מחדש
  let succeeded = 0;
  await Promise.allSettled(
    portfolio.map(async (stock) => {
      if (stock.manualPrice) return stock;
      const data = await fetchPrice(stock.symbol);
      if (data) {
        stock.currentPrice = data.price;
        stock.change = data.change;
        stock.prevClose = data.prevClose;
        succeeded++;
        renderAll(); // רנדר מחדש אחרי כל עדכון
        await saveStock('update', stock).catch(() => {});
      }
      return stock;
    })
  );

  const now = new Date();
  document.getElementById('lastUpdateText').textContent =
    `עודכן ${now.toLocaleTimeString('he-IL', {hour:'2-digit',minute:'2-digit'})}`;

  showToast(`עודכנו ${succeeded}/${portfolio.length} ניירות ערך`, succeeded > 0 ? 'success' : 'error');

  btn.disabled = false;
  btn.innerHTML = '🔄 רענן שערים';
}

// ─── Add / Delete / Edit ──────────────────────────────────────────
function toggleAddForm() {
  const f = document.getElementById('addForm');
  f.classList.toggle('open');
}

function addStock() {
  const name = document.getElementById('newName').value.trim();
  const symbol = document.getElementById('newSymbol').value.trim();
  const qty = parseFloat(document.getElementById('newQty').value);
  const avgPrice = parseFloat(document.getElementById('newAvgPrice').value);
  const emoji = document.getElementById('newEmoji').value.trim() || '📈';
  const desc = document.getElementById('newDesc').value.trim();
  const purchaseDate = document.getElementById('newDate').value;
  const imgUrl = document.getElementById('newImg').value.trim();

  if (!name || !symbol || isNaN(qty) || isNaN(avgPrice)) {
    showToast('נא למלא את כל השדות', 'error');
    return;
  }

  const newStock = { name, symbol, qty, avgPrice, emoji, desc, purchaseDate, imgUrl, currentPrice: '', change: '' };

  showToast('שומר...', '');
  saveStock('add', newStock).then(async () => {
    toggleAddForm();
    ['newName','newSymbol','newQty','newAvgPrice','newEmoji','newDesc','newDate','newImg'].forEach(id => {
      document.getElementById(id).value = '';
    });
    await loadPortfolio();
    renderAll();
    showToast(`${name} נוסף לתיק`, 'success');
    refreshAll();
  });
}

function setManualPrice(row) {
  const stock = portfolio.find(s => s._row == row);
  if (!stock) return;
  const input = prompt(`הזן שער נוכחי ידנית עבור ${stock.name} (₪):`, stock.currentPrice || '');
  if (input === null) return;
  const price = parseFloat(input);
  if (isNaN(price) || price <= 0) { showToast('שער לא תקין', 'error'); return; }
  stock.currentPrice = price;
  stock.change = 0;
  stock.manualPrice = true;
  saveStock('update', stock).then(() => {
    renderAll();
    showToast(`שער ${stock.name} עודכן ל-₪${fmt(price)}`, 'success');
  });
}

function deleteStock(row) {
  const stock = portfolio.find(s => s._row == row);
  if (!stock) return;
  if (!confirm(`למחוק את ${stock.name} מהתיק?`)) return;
  showToast('מוחק...', '');
  deleteStockRemote(row).then(async () => {
    await loadPortfolio();
    renderAll();
    showToast(`${stock.name} הוסר מהתיק`);
  });
}

function editStock(row) {
  const stock = portfolio.find(s => s._row == row);
  if (!stock) return;

  const qty = prompt(`כמות מניות (${stock.name}):`, stock.qty);
  if (qty === null) return;
  const price = prompt(`מחיר קנייה ממוצע:`, stock.avgPrice);
  if (price === null) return;
  const desc = prompt('תיאור / שייך למי:', stock.desc || '');
  if (desc === null) return;
  const dateInput = prompt('תאריך רכישה (YYYY-MM-DD):', stock.purchaseDate || '');
  if (dateInput === null) return;
  const imgUrl = prompt('קישור לתמונה (URL):', stock.imgUrl || '');
  if (imgUrl === null) return;

  stock.qty = parseFloat(qty) || stock.qty;
  stock.avgPrice = parseFloat(price) || stock.avgPrice;
  stock.desc = desc;
  stock.purchaseDate = dateInput;
  stock.imgUrl = imgUrl;

  showToast('שומר...', '');
  saveStock('update', stock).then(async () => {
    await loadPortfolio();
    renderAll();
    showToast('עודכן בהצלחה', 'success');
  });
}

// ─── Toast ────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ─── Advanced Chart ───────────────────────────────────────────────
function drawBuyVsCurrent(stock) {
  if (!stock.currentPrice) return '';
  return `<canvas id="chart-${stock._row}" style="width:100%;height:80px;display:block;cursor:pointer"
    onclick="loadChart(${stock._row})" title="לחץ לטעינת גרף היסטורי"></canvas>
    <div id="chart-status-${stock._row}" style="font-size:10px;color:var(--muted);text-align:center;margin-top:2px">
      לחץ לטעינת גרף היסטורי
    </div>`;
}

async function loadChart(row) {
  const stock = portfolio.find(s => s._row == row);
  if (!stock) return;

  const statusEl = document.getElementById(`chart-status-${row}`);
  const canvas = document.getElementById(`chart-${row}`);
  if (!canvas) return;

  statusEl.textContent = 'טוען נתונים...';

  try {
    const res = await fetch(`${PROXY_URL}/history?symbol=${encodeURIComponent(stock.symbol)}&period=6mo`, {
      headers: { 'X-API-Key': getKey() }
    });
    const data = await res.json();
    if (!data.prices || data.prices.length < 2) {
      statusEl.textContent = 'אין נתונים היסטוריים';
      return;
    }

    renderChart(canvas, data.prices, stock);
    statusEl.textContent = '';

  } catch(e) {
    statusEl.textContent = 'שגיאה בטעינת גרף';
  }
}

function renderChart(canvas, prices, stock) {
  const W = canvas.offsetWidth || 300;
  const H = 100;
  canvas.width = W * window.devicePixelRatio;
  canvas.height = H * window.devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

  const vals = prices.map(p => p.p);
  const minV = Math.min(...vals) * 0.995;
  const maxV = Math.max(...vals) * 1.005;
  const range = maxV - minV || 1;

  const toX = i => (i / (prices.length - 1)) * (W - 20) + 10;
  const toY = v => H - 20 - ((v - minV) / range) * (H - 30);

  const isPos = stock.currentPrice >= stock.avgPrice;
  const color = isPos ? '#00d4aa' : '#ff4757';

  // מילוי
  ctx.beginPath();
  ctx.moveTo(toX(0), H - 20);
  prices.forEach((p, i) => ctx.lineTo(toX(i), toY(p.p)));
  ctx.lineTo(toX(prices.length - 1), H - 20);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, color + '40');
  grad.addColorStop(1, color + '00');
  ctx.fillStyle = grad;
  ctx.fill();

  // קו מחיר
  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';
  prices.forEach((p, i) => i === 0 ? ctx.moveTo(toX(i), toY(p.p)) : ctx.lineTo(toX(i), toY(p.p)));
  ctx.stroke();

  // קו קנייה מקווקו
  const buyY = toY(stock.avgPrice);
  if (buyY >= 0 && buyY <= H - 20) {
    ctx.beginPath();
    ctx.strokeStyle = '#f0b429';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.moveTo(10, buyY);
    ctx.lineTo(W - 10, buyY);
    ctx.stroke();
    ctx.setLineDash([]);

    // תווית קנייה
    ctx.fillStyle = '#f0b429';
    ctx.font = `${10 * window.devicePixelRatio / window.devicePixelRatio}px Heebo, sans-serif`;
    ctx.textAlign = 'right';
    ctx.fillText(`קנייה ₪${stock.avgPrice}`, W - 12, buyY - 3);
  }

  // ציר X - תאריכים
  ctx.fillStyle = '#6b7fa3';
  ctx.font = '9px Heebo, sans-serif';
  ctx.textAlign = 'center';
  [0, Math.floor(prices.length / 2), prices.length - 1].forEach(i => {
    const d = new Date(prices[i].t);
    const label = `${d.getDate()}/${d.getMonth() + 1}`;
    ctx.fillText(label, toX(i), H - 5);
  });

  // נקודה נוכחית
  const lastX = toX(prices.length - 1);
  const lastY = toY(prices[prices.length - 1].p);
  ctx.beginPath();
  ctx.arc(lastX, lastY, 4, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();

  // בחר תקופה
  canvas.onclick = null;
}
}

// ─── Init ─────────────────────────────────────────────────────────
async function init() {
  showToast('טוען נתונים...', '');
  await loadPortfolio();
  renderAll();
  await refreshAll();
  setInterval(refreshAll, 5 * 60 * 1000);
}

// בדוק אם כבר מחובר (sessionStorage)
if (sessionStorage.getItem('portfolio_key')) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  init();
}
</script>
